<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Print Online</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f5f5f5;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.step{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

button{
padding:10px 20px;
border:none;
background:#2d89ef;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

.preview{
width:100%;
height:400px;
border:1px solid #ddd;
margin-top:10px;
}

.result{
margin-top:15px;
background:#fafafa;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Print Online</h1>

<!-- STEP 1 -->

<div class="step">

<h2>1. Upload File PDF</h2>

<input type="file" id="fileInput" accept="application/pdf">

<p id="fileName"></p>
<p id="fileSize"></p>

<iframe id="pdfPreview" class="preview"></iframe>

<br><br>

<button onclick="step1Complete()">Lanjut ke Kalkulator</button>

</div>


<!-- STEP 2 -->

<div class="step">

<h2>2. Kalkulator Harga</h2>

<label>Printer</label>

<br>

<label>
<input type="radio" name="printer" value="inkjet" checked onchange="hitungHarga()">
Inkjet
</label>

<label>
<input type="radio" name="printer" value="laser" onchange="hitungHarga()">
Laser
</label>

<br><br>

<label>Tipe Cetak</label>

<select id="tipeCetak" onchange="hitungHarga()">
<option value="bw">Hitam Putih</option>
<option value="warna">Warna</option>
</select>

<br><br>

<label>Ukuran Kertas</label>

<select id="ukuranKertas" onchange="hitungHarga()">
<option value="a4">A4</option>
<option value="folio">F4</option>
<option value="a3">A3</option>
</select>

<br><br>

<label>Jumlah Copy</label>

<input type="number" id="jumlahCopy" value="1" min="1" onchange="hitungHarga()">

<br><br>

<label>Sisi Cetak</label>

<select id="sisiCetak" onchange="hitungHarga()">
<option value="1">1 Sisi</option>
<option value="2">2 Sisi</option>
</select>

<input type="hidden" id="totalPages" value="1">

<div class="result">

<p>Halaman Efektif : <span id="efektifHalaman">1</span></p>

<p>Total Lembar : <span id="totalLembar">1</span></p>

<p>Harga per Lembar : <span id="hargaLembar">Rp 0</span></p>

<h3>Total Harga : <span id="totalHarga">Rp 0</span></h3>

</div>

<br>

<button onclick="step2Complete()">Lanjut ke Konfirmasi</button>

</div>


<!-- STEP 3 -->

<div class="step">

<h2>3. Kirim Pesanan</h2>

<p>Pesanan akan dikirim ke WhatsApp.</p>

<button onclick="sendWA()">Kirim ke WhatsApp</button>

</div>

</div>


<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let orderData={
fileName:"",
fileSize:"",
printer:"inkjet",
tipeCetak:"bw",
ukuranKertas:"a4",
totalPages:1,
jumlahCopy:1,
sisiCetak:"1",
totalHarga:0
};

let selectedFile=null;


document.getElementById("fileInput").addEventListener("change",async function(e){

const file=e.target.files[0];

if(!file) return;

selectedFile=file;

document.getElementById("fileName").textContent=file.name;

document.getElementById("fileSize").textContent=
Math.round(file.size/1024)+" KB";

orderData.fileName=file.name;

const url=URL.createObjectURL(file);

document.getElementById("pdfPreview").src=url;

try{

const buffer=await file.arrayBuffer();

const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

document.getElementById("totalPages").value=pdf.numPages;

orderData.totalPages=pdf.numPages;

hitungHarga();

}catch(e){

alert("Gagal membaca halaman PDF");

}

});


function step1Complete(){

if(!selectedFile){

alert("Silakan upload file dulu");

return;

}

alert("File siap dihitung.");

}



function hitungHarga(){

const printer=document.querySelector('input[name="printer"]:checked').value;

const tipe=document.getElementById("tipeCetak").value;

const ukuran=document.getElementById("ukuranKertas").value;

const jumlahCopy=parseInt(document.getElementById("jumlahCopy").value)||1;

const sisi=document.getElementById("sisiCetak").value;

const totalPages=parseInt(document.getElementById("totalPages").value)||1;

let harga=0;

if(tipe==="bw"){

if(printer==="laser") harga=300;

else harga=500;

}else{

harga=2000;

}

if(ukuran==="a3") harga*=2;

let lembar=sisi==="2"?Math.ceil(totalPages/2):totalPages;

let totalLembar=lembar*jumlahCopy;

let total=totalLembar*harga;

orderData.totalHarga=total;

orderData.printer=printer;

orderData.tipeCetak=tipe;

orderData.ukuranKertas=ukuran;

orderData.jumlahCopy=jumlahCopy;

orderData.sisiCetak=sisi;

document.getElementById("efektifHalaman").textContent=totalPages;

document.getElementById("totalLembar").textContent=totalLembar;

document.getElementById("hargaLembar").textContent=
"Rp "+harga.toLocaleString();

document.getElementById("totalHarga").textContent=
"Rp "+total.toLocaleString();

}



function step2Complete(){

if(orderData.totalHarga<=0){

alert("Harga belum dihitung");

return;

}

alert("Lanjut ke konfirmasi WhatsApp");

}



function sendWA(){

const pesan=`Halo saya ingin cetak file

File : ${orderData.fileName}

Total halaman : ${orderData.totalPages}

Jumlah copy : ${orderData.jumlahCopy}

Total harga : Rp ${orderData.totalHarga.toLocaleString()}

Mohon diproses.`;

window.open(

"https://wa.me/6285277930703?text="+encodeURIComponent(pesan),

"_blank"

);

}

</script>

</body>
</html>
