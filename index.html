<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedanPrint.online</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<header class="navbar">

<div class="logo">MedanPrint.online</div>

<a href="#order" class="btn">Order Print</a>

</header>

<section class="hero">

<h1>Print Dokumen Online di Medan</h1>

<p>Upload PDF → Hitung Harga → Kirim Order</p>

</section>

<section id="order" class="order">

<h2>Upload File</h2>

<div id="drop-area">

<p>Drag & Drop PDF di sini</p>

<input type="file" id="fileElem" accept="application/pdf">

</div>

<div class="options">

<select id="warna">
<option value="500">Hitam Putih</option>
<option value="2500">Warna</option>
</select>

<select id="ukuran">
<option>A4</option>
<option>F4</option>
</select>

<select id="sisi">
<option value="1">1 Sisi</option>
<option value="0.7">Bolak Balik</option>
</select>

</div>

<div id="totalHarga">Total: Rp0</div>

<button onclick="kirimWA()">Kirim ke WhatsApp</button>

<div id="preview"></div>

</section>

<script src="js/script.js"></script>

</body>
</html>
